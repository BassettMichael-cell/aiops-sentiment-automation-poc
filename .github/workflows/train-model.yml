name: Automated ML Training Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger from the Actions tab

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training pipeline
        run: python src/train.py

      - name: Upload model and report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-sentiment-model
          path: models/
          retention-days: 30

      # Optional: Automatically commit the trained model back to the repo
      # Uncomment the block below if you want this behavior (careful: can cause loops if not using [skip ci])
