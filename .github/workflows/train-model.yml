name: Automated ML Training Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write   # REQUIRED to push model back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # helps when pushing back

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training pipeline
        run: python src/train.py

      # Commit the trained model + report back into the repo so Streamlit Cloud can load it
      - name: Commit and push trained model
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # If models/ is ignored, this will silently do nothing — fix .gitignore if needed
          git add -A models/

          # Only commit if there are changes
          git diff --cached --quiet && echo "No model changes to commit" && exit 0

          git commit -m "chore(model): update trained sentiment model [skip ci]"
          git push

      - name: Upload model and report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-sentiment-model
          path: models/
          retention-days: 30
